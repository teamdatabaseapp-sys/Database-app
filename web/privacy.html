      '<p>Your privacy matters to us. Here\'s how we handle your information.</p><h2>1. Welcome</h2><p>Database LLC respects your privacy. This Privacy Policy explains what information we collect, how we use it, and how we protect it.</p><h2>2. How Your Data is Stored</h2><p>We provide the software, but your data is stored securely with trusted third-party cloud providers. We carefully select reputable partners, but since we don\'t directly control their infrastructure, their terms and privacy policies also apply to your data.</p><h2>3. What We Collect</h2><ul><li>Information You Give Us:</li><li>Account details (email, name, business name)</li><li>Client data you add to the app</li><li>Marketing content you create</li><li>Messages you send us</li></ul><ul><li>Information We Collect Automatically:</li><li>Device information (type, operating system)</li><li>How you use the app (features used, actions taken)</li><li>Log data (when you accessed things)</li><li>Analytics to help us improve</li></ul><h2>4. How We Use Your Information</h2><p>We use your information to:</p><ul><li>Run and improve the app</li><li>Process your transactions</li><li>Send you service updates</li><li>Make the app better</li><li>Respond to your questions</li><li>Meet legal requirements</li></ul><h2>5. Keeping Your Data Safe</h2><p>Your data is stored with cloud providers who take security seriously. We implement security measures too, but no online system is 100% secure. We do our best to protect your information.</p><h2>6. Sharing Your Information</h2><p>We don\'t sell your personal information. We may share it with:</p><ul><li>Our cloud storage partners</li><li>Service providers who help us operate</li><li>Legal authorities if required by law</li><li>Business partners, but only with your consent</li></ul><h2>7. Security</h2><p>We work hard to keep your data safe using secure and reliable methods. While we can\'t guarantee absolute security (no one can), we take reasonable precautions to protect your information.</p><h2>8. Your Rights</h2><p>Depending on where you live, you may be able to:</p><ul><li>Access your personal information</li><li>Correct mistakes</li><li>Delete your information</li><li>Opt out of certain uses</li><li>Take your data with you</li></ul><h2>9. How Long We Keep Your Data</h2><p>We keep your information while your account is active or as needed to provide our services. We may keep some information longer if required by law.</p><h2>10. Children</h2><p>DataBase is for users 18 and older. We don\'t knowingly collect information from children.</p><h2>11. Policy Updates</h2><p>We may update this policy sometimes. We\'ll let you know about important changes through the app.</p><h2>12. Questions?</h2><p>For privacy-related questions, please refer to our contact information in the Terms of Service.</p><h2>13. For California Residents</h2><p>Under the California Consumer Privacy Act (CCPA), you have additional rights, including knowing what information we collect and requesting deletion.</p><h2>14. For Eu/eea Residents</h2><p>Under GDPR, you have additional rights including access, correction, deletion, and data portability.</p><h2>15. Face Id and Touch Id</h2><p>If you choose to use Face ID or Touch ID for faster login:</p><ul><li>What It\'s For:</li><li>Biometric login is optional&mdash;you choose whether to enable it</li><li>It\'s used only to verify your identity when logging in</li></ul><ul><li>Your Biometric Data Stays on Your Device:</li><li>We never see, receive, or store your biometric data on our servers</li><li>All biometric data stays on your device, secured by Apple\'s hardware encryption</li><li>We only store a secure token to confirm authentication worked</li></ul><ul><li>You\'re in Control:</li><li>Enable or disable it anytime in Settings</li><li>You can always use password login instead</li><li>Turning it off removes all authentication tokens from your device</li><li>Uninstalling the app removes all related data</li></ul><ul><li>Legal Compliance:</li><li>Our approach complies with GDPR, CCPA, Illinois BIPA, Texas CUBI, and other biometric privacy laws</li><li>Since biometric data never leaves your device, we don\'t process it at all</li></ul><ul><li>Third-Party Access:</li><li>No one else can access your biometric data through our app</li><li>Apple\'s systems handle all biometric processing locally on your device</li></ul>',
      '<p>Tu privacidad es importante para nosotros. Esta política explica cómo manejamos tus datos de manera simple y clara.</p><h2>1. Quiénes Somos</h2><p>Database LLC gestiona la app DataBase. Si tienes preguntas sobre privacidad, puedes contactarnos en <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a>.</p><h2>2. Qué Recopilamos</h2><p>Información que nos proporcionas:</p><ul><li>Datos de cuenta (email, nombre, nombre del negocio)</li><li>Información de clientes que ingresas</li><li>Contenido de marketing que creas</li></ul><p>Información recopilada automáticamente:</p><ul><li>Tipo de dispositivo y sistema operativo</li><li>Cómo usas la app (funciones usadas, acciones realizadas)</li><li>Datos básicos para análisis</li></ul><h2>3. Cómo Usamos Tus Datos</h2><p>Usamos tus datos para:</p><ul><li>Hacer funcionar la app</li><li>Mejorar nuestros servicios</li><li>Enviarte actualizaciones importantes</li><li>Responder tus preguntas</li><li>Cumplir con obligaciones legales</li></ul><h2>4. Dónde Almacenamos Tus Datos</h2><p>Tus datos se almacenan:</p><ul><li>En tu dispositivo</li><li>En nuestra nube segura</li></ul><p>Utilizamos medidas de seguridad apropiadas para proteger tu información.</p><h2>5. Compartir Datos</h2><p>Nunca vendemos tus datos personales. Solo podemos compartir información con:</p><ul><li>Proveedores de servicios que nos ayudan a gestionar la app</li><li>Autoridades cuando lo requiere la ley</li><li>Socios comerciales, pero solo con tu consentimiento</li></ul><h2>6. Tus Derechos</h2><p>Tienes derecho a:</p><ul><li>Acceder a tus datos</li><li>Corregir información incorrecta</li><li>Eliminar tus datos</li><li>Solicitar una copia de tus datos</li><li>Oponerte a ciertos tratamientos</li></ul><h2>7. Por Cuánto Tiempo Conservamos los Datos</h2><p>Conservamos tus datos mientras tu cuenta esté activa. Alguna información puede conservarse más tiempo si lo requiere la ley.</p><h2>8. Menores</h2><p>La app no está destinada a personas menores de 18 años.</p><h2>9. Actualizaciones</h2><p>Podemos actualizar esta política. Te avisaremos sobre cambios importantes.</p><h2>10. Contáctanos</h2><p>¿Preguntas? Escríbenos a: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>11. Para Residentes de California</h2><p>Si vives en California, tienes derechos adicionales bajo el CCPA, incluyendo el derecho a saber qué datos recopilamos y a solicitar su eliminación.</p><h2>12. Para Residentes de la Ue/eee</h2><p>Si te encuentras en la Unión Europea, tienes derechos adicionales bajo el RGPD, incluyendo los derechos de acceso, rectificación, eliminación, limitación, portabilidad de datos y oposición.</p>',
      '<p>Votre vie privée nous tient à cœur. Voici comment nous gérons vos informations.</p><h2>1. Bienvenue</h2><p>Database LLC respecte votre vie privée. Cette Politique de confidentialité explique quelles informations nous collectons, comment nous les utilisons et comment nous les protégeons.</p><h2>2. Comment Vos Données Sont Stockées</h2><p>Nous fournissons le logiciel, mais vos données sont stockées en toute sécurité auprès de fournisseurs cloud tiers de confiance. Nous sélectionnons soigneusement des partenaires réputés, mais comme nous ne contrôlons pas directement leur infrastructure, leurs conditions et politiques de confidentialité s\'appliquent également à vos données.</p><h2>3. Ce Que Nous Collectons</h2><ul><li>Informations que vous nous donnez :</li><li>Détails du compte (email, nom, nom de l\'entreprise)</li><li>Données clients que vous ajoutez à l\'application</li><li>Contenu marketing que vous créez</li><li>Messages que vous nous envoyez</li></ul><ul><li>Informations que nous collectons automatiquement :</li><li>Informations sur l\'appareil (type, système d\'exploitation)</li><li>Comment vous utilisez l\'application (fonctionnalités utilisées, actions effectuées)</li><li>Données de journal (quand vous avez accédé aux éléments)</li><li>Analyses pour nous aider à améliorer</li></ul><h2>4. Comment Nous Utilisons Vos Informations</h2><p>Nous utilisons vos informations pour :</p><ul><li>Faire fonctionner et améliorer l\'application</li><li>Traiter vos transactions</li><li>Vous envoyer des mises à jour de service</li><li>Améliorer l\'application</li><li>Répondre à vos questions</li><li>Répondre aux exigences légales</li></ul><h2>5. Garder Vos Données en Sécurité</h2><p>Vos données sont stockées auprès de fournisseurs cloud qui prennent la sécurité au sérieux. Nous mettons également en place des mesures de sécurité, mais aucun système en ligne n\'est sécurisé à 100%. Nous faisons de notre mieux pour protéger vos informations.</p><h2>6. Partage de Vos Informations</h2><p>Nous ne vendons pas vos informations personnelles. Nous pouvons les partager avec :</p><ul><li>Nos partenaires de stockage cloud</li><li>Les prestataires de services qui nous aident à fonctionner</li><li>Les autorités légales si la loi l\'exige</li><li>Des partenaires commerciaux, mais uniquement avec votre consentement</li></ul><h2>7. Sécurité</h2><p>Nous travaillons dur pour garder vos données en sécurité en utilisant des méthodes sûres et fiables. Bien que nous ne puissions pas garantir une sécurité absolue (personne ne le peut), nous prenons des précautions raisonnables pour protéger vos informations.</p><h2>8. Vos Droits</h2><p>Selon votre lieu de résidence, vous pourriez être en mesure de :</p><ul><li>Accéder à vos informations personnelles</li><li>Corriger les erreurs</li><li>Supprimer vos informations</li><li>Vous opposer à certaines utilisations</li><li>Emporter vos données avec vous</li></ul><h2>9. Durée de Conservation de Vos Données</h2><p>Nous conservons vos informations tant que votre compte est actif ou selon les besoins pour fournir nos services. Nous pouvons conserver certaines informations plus longtemps si la loi l\'exige.</p><h2>10. Enfants</h2><p>DataBase est destiné aux utilisateurs de 18 ans et plus. Nous ne collectons pas sciemment d\'informations auprès d\'enfants.</p><h2>11. Mises À Jour de la Politique</h2><p>Nous pouvons mettre à jour cette politique parfois. Nous vous informerons des changements importants via l\'application.</p><h2>12. Des Questions ?</h2><p>Vous avez des questions sur la confidentialité ? Contactez-nous à : <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>13. Pour les Résidents de Californie</h2><p>En vertu du California Consumer Privacy Act (CCPA), vous avez des droits supplémentaires, notamment savoir quelles informations nous collectons et demander leur suppression.</p><h2>14. Pour les Résidents de L\'ue/eee</h2><p>En vertu du RGPD, vous avez des droits supplémentaires incluant l\'accès, la correction, la suppression et la portabilité des données.</p><h2>15. Face Id et Touch Id</h2><p>Si vous choisissez d\'utiliser Face ID ou Touch ID pour une connexion plus rapide :</p><ul><li>À quoi ça sert :</li><li>La connexion biométrique est optionnelle - vous choisissez de l\'activer ou non</li><li>Elle sert uniquement à vérifier votre identité lors de la connexion</li></ul><ul><li>Vos données biométriques restent sur votre appareil :</li><li>Nous ne voyons, recevons ni stockons jamais vos données biométriques sur nos serveurs</li><li>Toutes les données biométriques restent sur votre appareil, sécurisées par le chiffrement matériel d\'Apple</li><li>Nous stockons uniquement un jeton sécurisé pour confirmer que l\'authentification a fonctionné</li></ul><ul><li>Vous êtes en contrôle :</li><li>Activez ou désactivez à tout moment dans les Paramètres</li><li>Vous pouvez toujours utiliser la connexion par mot de passe à la place</li><li>La désactivation supprime tous les jetons d\'authentification de votre appareil</li><li>La désinstallation de l\'application supprime toutes les données associées</li></ul><ul><li>Conformité légale :</li><li>Notre approche est conforme au RGPD, CCPA, Illinois BIPA, Texas CUBI et autres lois sur la confidentialité biométrique</li><li>Puisque les données biométriques ne quittent jamais votre appareil, nous ne les traitons pas du tout</li></ul><ul><li>Accès par des tiers :</li><li>Personne d\'autre ne peut accéder à vos données biométriques via notre application</li><li>Les systèmes d\'Apple gèrent tout le traitement biométrique localement sur votre appareil</li></ul>',
      '<p>Sua privacidade é importante para nós. Aqui está o que você precisa saber sobre como tratamos suas informações.</p><h2>1. O Que Coletamos</h2><p>Informações que você nos fornece:</p><ul><li>Detalhes da conta (e-mail, nome, nome da empresa)</li><li>Dados de clientes que você insere</li><li>Conteúdo de marketing que você cria</li><li>Mensagens que você nos envia</li></ul><p>Informações coletadas automaticamente:</p><ul><li>Informações do dispositivo (tipo, sistema operacional)</li><li>Como você usa o app</li><li>Dados básicos de log e análise</li></ul><h2>2. Como Usamos Suas Informações</h2><p>Usamos seus dados para:</p><ul><li>Fazer o app funcionar para você</li><li>Processar suas transações</li><li>Enviar atualizações importantes do serviço</li><li>Melhorar nossos serviços</li><li>Responder às suas perguntas</li><li>Cumprir requisitos legais</li></ul><h2>3. Onde Seus Dados Ficam</h2><p>Seus dados de clientes são armazenados de forma segura no seu dispositivo e em nossa nuvem. Usamos medidas de segurança apropriadas para manter suas informações protegidas.</p><h2>4. Compartilhamento de Dados</h2><p>Não vendemos suas informações pessoais. Podemos compartilhar dados com:</p><ul><li>Provedores de serviços que nos ajudam a operar</li><li>Autoridades legais quando exigido por lei</li><li>Parceiros de negócios (apenas com seu consentimento)</li></ul><h2>5. Seus Direitos</h2><p>Dependendo de onde você mora, você pode:</p><ul><li>Acessar suas informações pessoais</li><li>Corrigir dados incorretos</li><li>Excluir suas informações</li><li>Optar por não participar de certos processamentos</li><li>Solicitar seus dados em formato portável</li></ul><h2>6. Por Quanto Tempo Mantemos os Dados</h2><p>Mantemos suas informações enquanto sua conta estiver ativa ou conforme necessário para fornecer serviços. Alguns dados podem ser retidos conforme exigido por lei.</p><h2>7. Privacidade de Crianças</h2><p>O app é para usuários com 18 anos ou mais. Não coletamos intencionalmente informações de crianças.</p><h2>8. Atualizações Desta Política</h2><p>Podemos atualizar esta política ocasionalmente. Informaremos você sobre mudanças significativas.</p><h2>9. Fale Conosco</h2><p>Dúvidas sobre privacidade? Entre em contato: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>10. Direitos Adicionais - Residentes do Brasil (LGPD)</h2><p>Se você está no Brasil, você tem direitos adicionais sob a Lei Geral de Proteção de Dados, incluindo saber quais informações coletamos e solicitar exclusão.</p><h2>11. Direitos Adicionais - Residentes da UE/EEE (RGPD)</h2><p>Se você está na União Europeia, você tem direitos adicionais sob o RGPD, incluindo acesso, retificação, exclusão, restrição de processamento, portabilidade de dados e oposição.</p>',
      '<p>Ihre Privatsphäre ist uns wichtig. Hier erfahren Sie, wie wir mit Ihren Daten umgehen.</p><h2>1. Was wir sammeln</h2><p>Von Ihnen bereitgestellte Informationen:</p><ul><li>Kontodaten (E-Mail, Name, Firmenname)</li><li>Kundendaten, die Sie eingeben</li><li>Marketing-Inhalte, die Sie erstellen</li><li>Nachrichten, die Sie uns senden</li></ul><p>Automatisch gesammelte Informationen:</p><ul><li>Geräteinformationen (Typ, Betriebssystem)</li><li>Wie Sie die App nutzen</li><li>Grundlegende Protokoll- und Analysedaten</li></ul><h2>2. Wie wir Ihre Informationen nutzen</h2><p>Wir verwenden Ihre Daten, um:</p><ul><li>Die App für Sie funktionsfähig zu machen</li><li>Ihre Transaktionen zu verarbeiten</li><li>Wichtige Service-Updates zu senden</li><li>Unsere Dienste zu verbessern</li><li>Ihre Fragen zu beantworten</li><li>Gesetzliche Anforderungen zu erfüllen</li></ul><h2>3. Wo Ihre Daten gespeichert werden</h2><p>Ihre Kundendaten werden sicher auf Ihrem Gerät und in unserer Cloud gespeichert. Wir verwenden angemessene Sicherheitsmaßnahmen, um Ihre Informationen zu schützen.</p><h2>4. Datenweitergabe</h2><p>Wir verkaufen Ihre persönlichen Daten nicht. Wir können Daten teilen mit:</p><ul><li>Dienstleistern, die uns bei der Betriebsführung helfen</li><li>Rechtsbehörden, wenn gesetzlich vorgeschrieben</li><li>Geschäftspartnern (nur mit Ihrer Zustimmung)</li></ul><h2>5. Ihre Rechte</h2><p>Je nachdem, wo Sie leben, können Sie möglicherweise:</p><ul><li>Auf Ihre persönlichen Daten zugreifen</li><li>Falsche Daten korrigieren</li><li>Ihre Informationen löschen</li><li>Bestimmten Verarbeitungen widersprechen</li><li>Ihre Daten in portabler Form anfordern</li></ul><h2>6. Wie lange wir Daten aufbewahren</h2><p>Wir bewahren Ihre Informationen auf, solange Ihr Konto aktiv ist oder wie für die Serviceerbringung erforderlich. Einige Daten können wie gesetzlich vorgeschrieben aufbewahrt werden.</p><h2>7. Datenschutz für Kinder</h2><p>Die App ist für Nutzer ab 18 Jahren bestimmt. Wir sammeln nicht absichtlich Informationen von Kindern.</p><h2>8. Aktualisierungen dieser Richtlinie</h2><p>Wir können diese Richtlinie gelegentlich aktualisieren. Wir werden Sie über wesentliche Änderungen informieren.</p><h2>9. Kontaktieren Sie uns</h2><p>Fragen zum Datenschutz? Kontaktieren Sie uns unter: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>10. Zusätzliche Rechte - Einwohner Kaliforniens (CCPA)</h2><p>Wenn Sie in Kalifornien ansässig sind, haben Sie zusätzliche Rechte unter dem CCPA, einschließlich des Rechts zu erfahren, welche Informationen wir sammeln, und der Löschung zu verlangen.</p><h2>11. Zusätzliche Rechte - Einwohner der EU/EWR (DSGVO)</h2><p>Wenn Sie in der Europäischen Union ansässig sind, haben Sie zusätzliche Rechte unter der DSGVO, einschließlich Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit und Widerspruch.</p>',
      '<p>Politik sa a eksplike kijan nou jere done ou nan DataBase. Nou bay valè konfidansyalite ou epi nou vle transparan sou sa.</p><h2>1. Ki Enfòmasyon Nou Kolekte</h2><p>Enfòmasyon Kont:</p><ul><li>Non ou ak imèl</li><li>Non biznis ou</li><li>Detay kont</li></ul><p>Done Biznis:</p><ul><li>Enfòmasyon kliyan ou antre</li><li>Istwa vizit ak revni</li><li>Kontni kanpay maketing</li></ul><p>Done Itilizasyon:</p><ul><li>Kijan ou itilize aplikasyon an</li><li>Enfòmasyon aparèy</li></ul><h2>2. Kijan Nou Itilize Enfòmasyon Ou</h2><ul><li>Bay ak kenbe sèvis aplikasyon an</li><li>Trete tranzaksyon</li><li>Voye notifikasyon ki gen rapò ak sèvis</li><li>Amelyore sèvis nou yo</li><li>Konfòme ak obligasyon legal</li></ul><h2>3. Kijan Nou Pwoteje Done Ou</h2><p>Nou itilize mezi sekirite nan nivo endistri pou pwoteje done ou. Pa gen okenn sistèm ki 100% sekirize, men nou fè pi bon efò nou pou kenbe enfòmasyon ou an sekirite.</p><h2>4. Konbyen Tan Nou Kenbe Done</h2><p>Nou kenbe done ou osi lontan ke kont ou aktif. Ou ka mande pou efase done ou nenpòt ki lè.</p><h2>5. Pataje ak Lòt</h2><p>Nou pa vann done pèsonèl ou. Nou ka pataje ak:</p><ul><li>Founisè sèvis ki ede nou opere aplikasyon an</li><li>Otorite si lalwa egzije sa</li><li>Achtè si konpayi an vann</li></ul><h2>6. Dwa Ou</h2><p>Dapre lwa aplikab yo, ou gen dwa:</p><ul><li>Jwenn aksè nan done ou</li><li>Korije done ki pa kòrèk</li><li>Efase done ou</li><li>Ekspòte done ou nan lòt kote</li></ul><h2>7. Cookies</h2><p>Aplikasyon an itilize cookies teknik nesesè pou fonksyone kòrèkteman.</p><h2>8. Konfidansyalite Timoun</h2><p>DataBase pa fèt pou timoun ki poko gen 13 an. Nou pa kolekte done nan men timoun volontèman.</p><h2>9. Chanjman nan Politik</h2><p>Nou ka mete ajou politik sa a tanzantan. Nou ap fè ou konnen chanjman enpòtan nan aplikasyon an.</p><h2>10. Kesyon?</h2><p>Si ou gen kesyon sou konfidansyalite, kontakte nou nan: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>La tua privacy è importante per noi. Questa informativa spiega come gestiamo i tuoi dati in modo semplice e chiaro.</p><h2>1. Chi Siamo</h2><p>Database LLC gestisce l\'app DataBase. Se hai domande sulla privacy, puoi contattarci a <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a>.</p><h2>2. Cosa Raccogliamo</h2><p>Informazioni che ci fornisci:</p><ul><li>Dati dell\'account (email, nome, nome azienda)</li><li>Informazioni sui clienti che inserisci</li><li>Contenuti di marketing che crei</li></ul><p>Informazioni raccolte automaticamente:</p><ul><li>Tipo di dispositivo e sistema operativo</li><li>Come utilizzi l\'app (funzionalità usate, azioni effettuate)</li><li>Dati di base per l\'analisi</li></ul><h2>3. Come Usiamo I Tuoi Dati</h2><p>Usiamo i tuoi dati per:</p><ul><li>Far funzionare l\'app</li><li>Migliorare i nostri servizi</li><li>Inviarti aggiornamenti importanti</li><li>Rispondere alle tue domande</li><li>Rispettare gli obblighi legali</li></ul><h2>4. Dove Conserviamo I Tuoi Dati</h2><p>I tuoi dati sono conservati:</p><ul><li>Sul tuo dispositivo</li><li>Nel nostro cloud sicuro</li></ul><p>Utilizziamo misure di sicurezza appropriate per proteggere le tue informazioni.</p><h2>5. Condivisione Dei Dati</h2><p>Non vendiamo mai i tuoi dati personali. Possiamo condividere informazioni solo con:</p><ul><li>Fornitori di servizi che ci aiutano a gestire l\'app</li><li>Autorità quando richiesto dalla legge</li><li>Partner commerciali, ma solo con il tuo consenso</li></ul><h2>6. I Tuoi Diritti</h2><p>Hai diritto di:</p><ul><li>Accedere ai tuoi dati</li><li>Correggere informazioni errate</li><li>Eliminare i tuoi dati</li><li>Richiedere una copia dei tuoi dati</li><li>Opporti a determinati trattamenti</li></ul><h2>7. Per Quanto Tempo Conserviamo I Dati</h2><p>Conserviamo i tuoi dati finché il tuo account è attivo. Alcune informazioni potrebbero essere conservate più a lungo se richiesto dalla legge.</p><h2>8. Minori</h2><p>L\'app non è destinata a persone di età inferiore a 18 anni.</p><h2>9. Aggiornamenti</h2><p>Potremmo aggiornare questa informativa. Ti avviseremo dei cambiamenti importanti.</p><h2>10. Contattaci</h2><p>Domande? Scrivi a: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>11. Per I Residenti in California</h2><p>Se vivi in California, hai diritti aggiuntivi ai sensi del CCPA, incluso il diritto di sapere quali dati raccogliamo e di richiederne la cancellazione.</p><h2>12. Per I Residenti Ue/see</h2><p>Se ti trovi nell\'Unione Europea, hai diritti aggiuntivi ai sensi del GDPR, inclusi i diritti di accesso, rettifica, cancellazione, limitazione, portabilità dei dati e opposizione.</p>',
      '<p>Je privacy is belangrijk voor ons. Dit beleid legt uit hoe we je gegevens behandelen op een eenvoudige en duidelijke manier.</p><h2>1. Wie We Zijn</h2><p>Database LLC beheert de DataBase-app. Als je vragen hebt over privacy, kun je contact met ons opnemen via <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a>.</p><h2>2. Wat We Verzamelen</h2><p>Informatie die je ons geeft:</p><ul><li>Accountgegevens (e-mail, naam, bedrijfsnaam)</li><li>Klantinformatie die je invoert</li><li>Marketinginhoud die je maakt</li></ul><p>Informatie die automatisch wordt verzameld:</p><ul><li>Apparaattype en besturingssysteem</li><li>Hoe je de app gebruikt (gebruikte functies, uitgevoerde acties)</li><li>Basisgegevens voor analyse</li></ul><h2>3. Hoe We Je Gegevens Gebruiken</h2><p>We gebruiken je gegevens om:</p><ul><li>De app te laten werken</li><li>Onze diensten te verbeteren</li><li>Je belangrijke updates te sturen</li><li>Je vragen te beantwoorden</li><li>Aan wettelijke verplichtingen te voldoen</li></ul><h2>4. Waar We Je Gegevens Opslaan</h2><p>Je gegevens worden opgeslagen:</p><ul><li>Op je apparaat</li><li>In onze beveiligde cloud</li></ul><p>We gebruiken passende beveiligingsmaatregelen om je informatie te beschermen.</p><h2>5. Gegevens Delen</h2><p>We verkopen nooit je persoonlijke gegevens. We kunnen alleen informatie delen met:</p><ul><li>Dienstverleners die ons helpen de app te beheren</li><li>Autoriteiten wanneer de wet dit vereist</li><li>Zakenpartners, maar alleen met jouw toestemming</li></ul><h2>6. Je Rechten</h2><p>Je hebt het recht om:</p><ul><li>Toegang te krijgen tot je gegevens</li><li>Onjuiste informatie te corrigeren</li><li>Je gegevens te verwijderen</li><li>Een kopie van je gegevens op te vragen</li><li>Bezwaar te maken tegen bepaalde verwerkingen</li></ul><h2>7. Hoe Lang We Gegevens Bewaren</h2><p>We bewaren je gegevens zolang je account actief is. Sommige informatie kan langer worden bewaard als de wet dit vereist.</p><h2>8. Minderjarigen</h2><p>De app is niet bedoeld voor personen jonger dan 18 jaar.</p><h2>9. Updates</h2><p>We kunnen dit beleid bijwerken. We laten je weten over belangrijke wijzigingen.</p><h2>10. Neem Contact Met Ons Op</h2><p>Vragen? Stuur ons een e-mail: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>11. Voor Inwoners van Californië</h2><p>Als je in Californië woont, heb je aanvullende rechten onder de CCPA, waaronder het recht om te weten welke gegevens we verzamelen en om verwijdering te verzoeken.</p><h2>12. Voor Inwoners van de Eu/eer</h2><p>Als je je in de Europese Unie bevindt, heb je aanvullende rechten onder de AVG, waaronder de rechten van toegang, rectificatie, verwijdering, beperking, gegevensportabiliteit en bezwaar.</p>',
      '<p>Din integritet är viktig för oss. Här är hur vi hanterar dina data.</p><h2>Information Vi Samlar in</h2><ul><li>Kontoinformation (namn, e-post)</li><li>Företagsinformation</li><li>Kunddata du anger i appen</li><li>Användningsdata (hur du interagerar med appen)</li><li>Enhetsinformation</li></ul><h2>Hur Vi Använder Din Information</h2><ul><li>Tillhandahålla och förbättra tjänsten</li><li>Hantera ditt konto</li><li>Skicka dig viktiga uppdateringar</li><li>Svara på dina frågor</li></ul><h2>Datasäkerhet</h2><p>Vi använder pålitliga metoder för att skydda dina data. Även om inget system är 100% säkert gör vi vårt bästa för säkerheten.</p><h2>Datadelning</h2><p>Vi säljer inte din personliga information. Vi delar endast:</p><ul><li>Med ditt tillstånd</li><li>Med våra tjänsteleverantörer (när det är nödvändigt för att tillhandahålla tjänsten)</li><li>Vid juridiska krav</li></ul><h2>Datalagring</h2><p>Vi lagrar dina data så länge ditt konto är aktivt eller så länge det är nödvändigt för att ge dig service.</p><h2>Dina Rättigheter</h2><p>Du kan ha rätt att få tillgång till, rätta eller radera dina data. Kontakta oss på <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>Ändringar I Policyn</h2><p>Vi kan uppdatera denna policy. Vid väsentliga ändringar informerar vi dig.</p>',
      '<p>Denne erklæringen forklarer hvordan vi håndterer dataene dine i DataBase. Vi verdsetter ditt personvern og ønsker å være åpne om det.</p><h2>1. Hvilken informasjon vi samler inn</h2><p>Kontoinformasjon:</p><ul><li>Ditt navn og e-post</li><li>Bedriftens navn</li><li>Kontoopplysninger</li></ul><p>Forretningsdata:</p><ul><li>Kundeinformasjon du legger inn</li><li>Besøks- og inntektshistorikk</li><li>Innhold i markedsføringskampanjer</li></ul><p>Bruksdata:</p><ul><li>Hvordan du bruker appen</li><li>Enhetsinformasjon</li></ul><h2>2. Hvordan vi bruker informasjonen din</h2><ul><li>Levere og vedlikeholde apptjenester</li><li>Behandle transaksjoner</li><li>Sende tjenesterelaterte varsler</li><li>Forbedre tjenestene våre</li><li>Overholde juridiske forpliktelser</li></ul><h2>3. Hvordan vi beskytter dataene dine</h2><p>Vi bruker bransjestandard sikkerhetstiltak for å beskytte dataene dine. Ingen systemer er 100% sikre, men vi gjør vårt beste for å holde informasjonen din trygg.</p><h2>4. Hvor lenge vi beholder data</h2><p>Vi beholder dataene dine så lenge kontoen din er aktiv. Du kan be om sletting av dataene dine når som helst.</p><h2>5. Deling med andre</h2><p>Vi selger ikke dine personlige data. Vi kan dele med:</p><ul><li>Tjenesteleverandører som hjelper oss med å drifte appen</li><li>Myndigheter hvis lovpålagt</li><li>Kjøpere hvis selskapet selges</li></ul><h2>6. Dine rettigheter</h2><p>Under gjeldende lover har du rett til å:</p><ul><li>Få tilgang til dataene dine</li><li>Rette unøyaktige data</li><li>Slette dataene dine</li><li>Eksportere dataene dine til andre steder</li></ul><h2>7. Informasjonskapsler</h2><p>Appen bruker nødvendige tekniske informasjonskapsler for å fungere ordentlig.</p><h2>8. Barns personvern</h2><p>DataBase er ikke ment for barn under 13 år. Vi samler ikke bevisst inn informasjon fra barn.</p><h2>9. Endringer i erklæringen</h2><p>Vi kan oppdatere denne erklæringen fra tid til annen. Vi vil informere deg om vesentlige endringer i appen.</p><h2>10. Spørsmål?</h2><p>Hvis du har spørsmål om personvern, kontakt oss på: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>Dit privatliv er vigtigt for os. Her er, hvordan vi håndterer dine data.</p><h2>Information Vi Indsamler</h2><ul><li>Kontooplysninger (navn, e-mail)</li><li>Virksomhedsoplysninger</li><li>Kundedata, du indtaster i appen</li><li>Brugsdata (hvordan du interagerer med appen)</li><li>Enhedsoplysninger</li></ul><h2>Hvordan Vi Bruger Dine Oplysninger</h2><ul><li>Levere og forbedre tjenesten</li><li>Administrere din konto</li><li>Sende dig vigtige opdateringer</li><li>Besvare dine spørgsmål</li></ul><h2>Datasikkerhed</h2><p>Vi bruger pålidelige metoder til at beskytte dine data. Selvom intet system er 100% sikkert, gør vi vores bedste for sikkerheden.</p><h2>Datadeling</h2><p>Vi sælger ikke dine personlige oplysninger. Vi deler kun:</p><ul><li>Med din tilladelse</li><li>Med vores tjenesteudbydere (når det er nødvendigt for at levere tjenesten)</li><li>Ved juridiske krav</li></ul><h2>Dataopbevaring</h2><p>Vi opbevarer dine data, så længe din konto er aktiv, eller så længe det er nødvendigt for at yde service til dig.</p><h2>Dine Rettigheder</h2><p>Du kan have ret til at få adgang til, rette eller slette dine data. Kontakt os på <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>Ændringer I Politikken</h2><p>Vi kan opdatere denne politik. Ved væsentlige ændringer informerer vi dig.</p>',
      '<p>Tämä käytäntö selittää, miten käsittelemme tietojasi DataBasessa. Arvostamme yksityisyyttäsi ja haluamme olla avoimia asiassa.</p><h2>1. Mitä tietoja keräämme</h2><p>Tilitiedot:</p><ul><li>Nimesi ja sähköpostisi</li><li>Yrityksesi nimi</li><li>Tilitietosi</li></ul><p>Liiketoimintatiedot:</p><ul><li>Asiakastiedot, jotka syötät</li><li>Käynti- ja tuottohistoria</li><li>Markkinointikampanjoiden sisältö</li></ul><p>Käyttötiedot:</p><ul><li>Miten käytät sovellusta</li><li>Laitetiedot</li></ul><h2>2. Miten käytämme tietojasi</h2><ul><li>Tarjoamme ja ylläpidämme sovelluksen palveluja</li><li>Käsittelemme tapahtumia</li><li>Lähetämme palveluun liittyviä ilmoituksia</li><li>Parannamme palvelujamme</li><li>Noudatamme lakisääteisiä velvoitteita</li></ul><h2>3. Miten suojaamme tietojasi</h2><p>Käytämme alan standardien mukaisia turvatoimia suojaamaan tietojasi. Mikään järjestelmä ei ole 100% turvallinen, mutta teemme parhaamme pitääksemme tietosi turvassa.</p><h2>4. Miten kauan säilytämme tietoja</h2><p>Säilytämme tietojasi niin kauan kuin tilisi on aktiivinen. Voit pyytää tietojesi poistamista milloin tahansa.</p><h2>5. Jakaminen muiden kanssa</h2><p>Emme myy henkilötietojasi. Saatamme jakaa tietoja:</p><ul><li>Palveluntarjoajille, jotka auttavat meitä sovelluksen ylläpidossa</li><li>Viranomaisille, jos laki sitä vaatii</li><li>Ostajalle, jos yritys myydään</li></ul><h2>6. Oikeutesi</h2><p>Sovellettavien lakien mukaan sinulla on oikeus:</p><ul><li>Päästä käsiksi tietoihisi</li><li>Korjata virheellisiä tietoja</li><li>Poistaa tietosi</li><li>Viedä tietosi muualle</li></ul><h2>7. Evästeet</h2><p>Sovellus käyttää välttämättömiä teknisiä evästeitä toimiakseen kunnolla.</p><h2>8. Lasten tietosuoja</h2><p>DataBase ei ole tarkoitettu alle 13-vuotiaille lapsille. Emme tietoisesti kerää tietoja lapsilta.</p><h2>9. Käytännön muutokset</h2><p>Saatamme päivittää tätä käytäntöä aika ajoin. Ilmoitamme merkittävistä muutoksista sovelluksessa.</p><h2>10. Kysyttävää?</h2><p>Jos sinulla on kysymyksiä tietosuojasta, ota yhteyttä: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>Persónuvernd þín er okkur mikilvæg. Hér er hvernig við meðhöndlum gögnin þín.</p><h2>Upplýsingar Sem Við Söfnum</h2><ul><li>Reikningsupplýsingar (nafn, netfang)</li><li>Fyrirtækjaupplýsingar</li><li>Viðskiptavinagögn sem þú setur inn í forritið</li><li>Notkunargögn (hvernig þú notar forritið)</li><li>Tækjaupplýsingar</li></ul><h2>Hvernig Við Notum Upplýsingarnar Þínar</h2><ul><li>Að veita og bæta þjónustuna</li><li>Að stjórna reikningnum þínum</li><li>Að senda þér mikilvægar uppfærslur</li><li>Að svara spurningum þínum</li></ul><h2>Gagnaöryggi</h2><p>Við notum áreiðanlegar aðferðir til að vernda gögnin þín. Þó ekkert kerfi sé 100% öruggt gerum við okkar besta fyrir öryggi.</p><h2>Gagnadeiling</h2><p>Við seljum ekki persónulegar upplýsingar þínar. Við deilum aðeins:</p><ul><li>Með þínu leyfi</li><li>Með þjónustuaðilum okkar (þegar nauðsynlegt til að veita þjónustu)</li><li>Við lagalegar kröfur</li></ul><h2>Gagnageymsla</h2><p>Við geymum gögnin þín á meðan reikningurinn þinn er virkur eða eins lengi og þarf til að veita þér þjónustu.</p><h2>Réttindi Þín</h2><p>Þú getur átt rétt á að fá aðgang að, leiðrétta eða eyða gögnum þínum. Hafðu samband við okkur á <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>Breytingar Á Stefnu</h2><p>Við getum uppfært þessa stefnu. Við látum þig vita um mikilvægar breytingar.</p>',
      '<p>Ваша конфиденциальность важна для нас. Эта политика объясняет, как мы обрабатываем ваши данные простым и понятным языком.</p><h2>1. Кто Мы</h2><p>Database LLC управляет приложением DataBase. Если у вас есть вопросы о конфиденциальности, вы можете связаться с нами по адресу <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a>.</p><h2>2. Что Мы Собираем</h2><p>Информация, которую вы нам предоставляете:</p><ul><li>Данные аккаунта (email, имя, название компании)</li><li>Информация о клиентах, которую вы вводите</li><li>Маркетинговый контент, который вы создаёте</li></ul><p>Информация, собираемая автоматически:</p><ul><li>Тип устройства и операционная система</li><li>Как вы используете приложение (используемые функции, выполненные действия)</li><li>Базовые данные для аналитики</li></ul><h2>3. Как Мы Используем Ваши Данные</h2><p>Мы используем ваши данные для:</p><ul><li>Работы приложения</li><li>Улучшения наших сервисов</li><li>Отправки важных обновлений</li><li>Ответов на ваши вопросы</li><li>Выполнения юридических обязательств</li></ul><h2>4. Где Мы Храним Ваши Данные</h2><p>Ваши данные хранятся:</p><ul><li>На вашем устройстве</li><li>В нашем защищённом облаке</li></ul><p>Мы применяем соответствующие меры безопасности для защиты вашей информации.</p><h2>5. Передача Данных</h2><p>Мы никогда не продаём ваши личные данные. Мы можем передавать информацию только:</p><ul><li>Поставщикам услуг, которые помогают нам управлять приложением</li><li>Властям, когда этого требует закон</li><li>Бизнес-партнёрам, но только с вашего согласия</li></ul><h2>6. Ваши Права</h2><p>Вы имеете право:</p><ul><li>Получить доступ к своим данным</li><li>Исправить неточную информацию</li><li>Удалить свои данные</li><li>Запросить копию своих данных</li><li>Возразить против определённой обработки</li></ul><h2>7. Как Долго Мы Храним Данные</h2><p>Мы храним ваши данные, пока ваш аккаунт активен. Некоторая информация может храниться дольше, если этого требует закон.</p><h2>8. Несовершеннолетние</h2><p>Приложение не предназначено для лиц младше 18 лет.</p><h2>9. Обновления</h2><p>Мы можем обновлять эту политику. Мы сообщим вам о важных изменениях.</p><h2>10. Свяжитесь С Нами</h2><p>Вопросы? Напишите нам: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><h2>11. Для Жителей Калифорнии</h2><p>Если вы живёте в Калифорнии, у вас есть дополнительные права по CCPA, включая право знать, какие данные мы собираем, и запросить их удаление.</p><h2>12. Для Жителей Ес/Еэз</h2><p>Если вы находитесь в Европейском Союзе, у вас есть дополнительные права по GDPR, включая права на доступ, исправление, удаление, ограничение, переносимость данных и возражение.</p>',
      '<p>Gizliliğiniz bizim için önemlidir. İşte verilerinizi nasıl ele aldığımız.</p><h2>Topladiğimiz Bi̇lgi̇ler</h2><ul><li>Hesap bilgileri (ad, e-posta)</li><li>İşletme bilgileri</li><li>Uygulamaya girdiğiniz müşteri verileri</li><li>Kullanım verileri (uygulamayla nasıl etkileşime girdiğiniz)</li><li>Cihaz bilgileri</li></ul><h2>Bi̇lgi̇leri̇ni̇zi̇ Nasil Kullaniriz</h2><ul><li>Hizmeti sağlamak ve geliştirmek</li><li>Hesabınızı yönetmek</li><li>Size önemli güncellemeler göndermek</li><li>Sorularınıza yanıt vermek</li></ul><h2>Veri̇ Güvenli̇ği̇</h2><p>Verilerinizi korumak için güvenilir yöntemler kullanıyoruz. Hiçbir sistem %100 güvenli olamasa da, güvenlik için elimizden geleni yapıyoruz.</p><h2>Veri̇ Paylaşimi</h2><p>Kişisel bilgilerinizi satmayız. Yalnızca şu durumlarda paylaşırız:</p><ul><li>İzninizle</li><li>Hizmet sağlayıcılarımızla (hizmeti sunmak için gerekli olduğunda)</li><li>Yasal zorunluluk durumunda</li></ul><h2>Veri̇ Saklama</h2><p>Verilerinizi hesabınız aktifken veya size hizmet vermek için gerekli olduğu sürece saklarız.</p><h2>Haklariniz</h2><p>Verilerinize erişme, düzeltme veya silme hakkınız olabilir. Bize <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a> adresinden ulaşabilirsiniz.</p><h2>Poli̇ti̇ka Deği̇şi̇kli̇kleri̇</h2><p>Bu politikayı güncelleyebiliriz. Önemli değişikliklerde sizi bilgilendireceğiz.</p>',
      '<p>您的隐私对我们很重要。以下是关于我们如何处理您信息的说明。</p><h2>1. 我们收集的信息</h2><p>您提供给我们的信息：</p><ul><li>账户详情（电子邮件、姓名、公司名称）</li><li>您输入的客户数据</li><li>您创建的营销内容</li><li>您发送给我们的消息</li></ul><p>自动收集的信息：</p><ul><li>设备信息（类型、操作系统）</li><li>您如何使用应用</li><li>基本日志和分析数据</li></ul><h2>2. 我们如何使用您的信息</h2><p>我们使用您的数据来：</p><ul><li>使应用为您正常工作</li><li>处理您的交易</li><li>发送重要的服务更新</li><li>改进我们的服务</li><li>回答您的问题</li><li>满足法律要求</li></ul><h2>3. 您的数据存储位置</h2><p>您的客户数据安全地存储在您的设备和我们的云端。我们使用适当的安全措施来保护您的信息。</p><h2>4. 数据共享</h2><p>我们不出售您的个人信息。我们可能与以下各方共享数据：</p><ul><li>帮助我们运营的服务提供商</li><li>法律要求时的法律机关</li><li>业务合作伙伴（仅在您同意的情况下）</li></ul><h2>5. 您的权利</h2><p>根据您所在的位置，您可能可以：</p><ul><li>访问您的个人信息</li><li>更正不准确的数据</li><li>删除您的信息</li><li>选择退出某些处理</li><li>以便携格式请求您的数据</li></ul><h2>6. 我们保留数据的时间</h2><p>在您的账户处于活动状态或需要提供服务期间，我们会保留您的信息。某些数据可能会根据法律要求保留。</p><h2>7. 儿童隐私</h2><p>应用适用于18岁及以上的用户。我们不会故意收集儿童的信息。</p><h2>8. 本政策的更新</h2><p>我们可能会不时更新本政策。我们会通知您重大变更。</p><h2>9. 联系我们</h2><p>有隐私问题？请联系我们：<a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>이 정책은 DataBase에서 귀하의 데이터를 처리하는 방법을 설명합니다. 개인정보를 소중히 여기며 투명하게 하고자 합니다.</p><h2>1. 수집하는 정보</h2><p>계정 정보:</p><ul><li>이름 및 이메일</li><li>비즈니스 이름</li><li>계정 세부 정보</li></ul><p>비즈니스 데이터:</p><ul><li>입력하는 고객 정보</li><li>방문 및 수익 기록</li><li>마케팅 캠페인 콘텐츠</li></ul><p>사용 데이터:</p><ul><li>앱 사용 방법</li><li>기기 정보</li></ul><h2>2. 정보 사용 방법</h2><ul><li>앱 서비스 제공 및 유지</li><li>거래 처리</li><li>서비스 관련 알림 발송</li><li>서비스 개선</li><li>법적 의무 준수</li></ul><h2>3. 데이터 보호 방법</h2><p>업계 표준 보안 조치를 사용하여 데이터를 보호합니다. 100% 안전한 시스템은 없지만 정보를 안전하게 유지하기 위해 최선을 다합니다.</p><h2>4. 데이터 보존 기간</h2><p>계정이 활성 상태인 동안 데이터를 보존합니다. 언제든지 데이터 삭제를 요청할 수 있습니다.</p><h2>5. 타인과 공유</h2><p>개인 데이터를 판매하지 않습니다. 다음과 공유할 수 있습니다:</p><ul><li>앱 운영을 돕는 서비스 제공업체</li><li>법률이 요구하는 경우 당국</li><li>회사가 매각되는 경우 구매자</li></ul><h2>6. 귀하의 권리</h2><p>관련 법률에 따라 다음 권리가 있습니다:</p><ul><li>데이터 접근</li><li>부정확한 데이터 수정</li><li>데이터 삭제</li><li>데이터를 다른 곳으로 내보내기</li></ul><h2>7. 쿠키</h2><p>앱은 제대로 작동하기 위해 필요한 기술 쿠키를 사용합니다.</p><h2>8. 아동 개인정보 보호</h2><p>DataBase는 13세 미만 아동을 대상으로 하지 않습니다. 의도적으로 아동의 정보를 수집하지 않습니다.</p><h2>9. 정책 변경</h2><p>이 정책을 수시로 업데이트할 수 있습니다. 중요한 변경 사항은 앱에서 알려드리겠습니다.</p><h2>10. 질문이 있으신가요?</h2><p>개인정보 보호에 대한 질문이 있으시면 연락주세요: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>お客様のプライバシーは当社にとって重要です。お客様の情報の取り扱いについてご説明します。</p><h2>1. 収集する情報</h2><p>お客様が提供する情報：</p><ul><li>アカウント詳細（メールアドレス、氏名、会社名）</li><li>入力する顧客データ</li><li>作成するマーケティングコンテンツ</li><li>当社へのメッセージ</li></ul><p>自動的に収集される情報：</p><ul><li>デバイス情報（種類、オペレーティングシステム）</li><li>アプリの使用方法</li><li>基本的なログおよび分析データ</li></ul><h2>2. 情報の使用方法</h2><p>お客様のデータは以下の目的で使用します：</p><ul><li>アプリを機能させる</li><li>取引を処理する</li><li>重要なサービス更新を送信する</li><li>サービスを改善する</li><li>ご質問に回答する</li><li>法的要件を遵守する</li></ul><h2>3. データの保管場所</h2><p>お客様の顧客データは、お客様のデバイスと当社のクラウドに安全に保存されます。お客様の情報を保護するために適切なセキュリティ対策を使用しています。</p><h2>4. データの共有</h2><p>お客様の個人情報を販売することはありません。以下とデータを共有する場合があります：</p><ul><li>当社の運営を支援するサービスプロバイダー</li><li>法律で要求される場合の法的機関</li><li>ビジネスパートナー（お客様の同意がある場合のみ）</li></ul><h2>5. お客様の権利</h2><p>お住まいの場所によっては、以下が可能な場合があります：</p><ul><li>個人情報へのアクセス</li><li>不正確なデータの修正</li><li>情報の削除</li><li>特定の処理のオプトアウト</li><li>ポータブル形式でのデータの要求</li></ul><h2>6. データの保持期間</h2><p>お客様のアカウントがアクティブな間、またはサービスの提供に必要な期間、情報を保持します。一部のデータは法律の要求に応じて保持される場合があります。</p><h2>7. 子どものプライバシー</h2><p>アプリは18歳以上のユーザー向けです。子どもの情報を意図的に収集することはありません。</p><h2>8. 本ポリシーの更新</h2><p>本ポリシーは随時更新される場合があります。重要な変更についてはお知らせします。</p><h2>9. お問い合わせ</h2><p>プライバシーに関するご質問がありますか？お問い合わせください：<a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>'

  ];

  function switchLang(lang) {
    try { localStorage.setItem('db_lang', lang); } catch(e) {}
    var tr = TR[lang] || TR['en'];
    var el;
    el = document.getElementById('privacy-label'); if (el && tr.privacy_label) el.textContent = tr.privacy_label;
    el = document.getElementById('privacy-title'); if (el && tr.privacy_title) el.textContent = tr.privacy_title;
    el = document.getElementById('footer-copy'); if (el && tr.footer_copy) el.textContent = tr.footer_copy;
    el = document.getElementById('link-privacy'); if (el && tr.footer_privacy) { el.textContent = tr.footer_privacy; el.href = 'privacy.html?lang=' + lang; }
    el = document.getElementById('link-terms'); if (el && tr.footer_terms) { el.textContent = tr.footer_terms; el.href = 'terms.html?lang=' + lang; }
    el = document.getElementById('back-link'); if (el) el.href = 'index.html?lang=' + lang;
    el = document.getElementById('lang-pill-text'); if (el) el.textContent = LANG_NAMES[lang] || lang;
    el = document.getElementById('page-date'); if (el) el.textContent = LAST_UPDATED[lang] || LAST_UPDATED['en'];
    var sel = document.querySelector('.lang-select-overlay'); if (sel) sel.value = lang;
    document.documentElement.lang = lang;
    var bodyEl = document.getElementById('privacy-body');
    if (bodyEl) bodyEl.innerHTML = PRIVACY_BODIES[Object.keys(LANG_NAMES).indexOf(lang)] || PRIVACY_BODIES[0];
    var url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    history.pushState({}, '', url.toString());
  }

  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');
    if (!lang) { try { lang = localStorage.getItem('db_lang'); } catch(e) {} }
    if (!lang || !TR[lang]) lang = 'en';
    switchLang(lang);
  })();

</script>
