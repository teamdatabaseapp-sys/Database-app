  function switchLang(lang) {
    try { localStorage.setItem('db_lang', lang); } catch(e) {}
    var tr = TR[lang] || TR['en'];
    var el;
    el = document.getElementById('privacy-label'); if (el && tr.privacy_label) el.textContent = tr.privacy_label;
    el = document.getElementById('privacy-title'); if (el && tr.privacy_title) el.textContent = tr.privacy_title;
    el = document.getElementById('footer-copy'); if (el && tr.footer_copy) el.textContent = tr.footer_copy;
    el = document.getElementById('link-privacy'); if (el && tr.footer_privacy) { el.textContent = tr.footer_privacy; el.href = 'privacy.html?lang=' + lang; }
    el = document.getElementById('link-terms'); if (el && tr.footer_terms) { el.textContent = tr.footer_terms; el.href = 'terms.html?lang=' + lang; }
    el = document.getElementById('back-link'); if (el) el.href = 'index.html?lang=' + lang;
    el = document.getElementById('lang-pill-text'); if (el) el.textContent = LANG_NAMES[lang] || lang;
    var sel = document.querySelector('.lang-select-overlay'); if (sel) sel.value = lang;
    document.documentElement.lang = lang;
    var bodyEl = document.getElementById('privacy-body');
    if (bodyEl) bodyEl.innerHTML = PRIVACY_BODIES[Object.keys(LANG_NAMES).indexOf(lang)] || PRIVACY_BODIES[0];
    var url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    history.pushState({}, '', url.toString());
  }

  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');
    if (!lang) { try { lang = localStorage.getItem('db_lang'); } catch(e) {} }
    if (!lang || !TR[lang]) lang = 'en';
    switchLang(lang);
  })();
