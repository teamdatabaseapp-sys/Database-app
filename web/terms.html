      '<p>Willkommen bei DataBase! Bevor Sie beginnen, möchten wir Ihnen erklären, wie unser Service funktioniert und was Sie erwarten können.</p><h2>1. Zustimmung zu diesen Bedingungen</h2><p>Durch die Nutzung von DataBase stimmen Sie diesen Bedingungen, unserer Datenschutzrichtlinie und unserem rechtlichen Hinweis zu. Wenn etwas unklar ist, kontaktieren Sie uns gerne &mdash; wir erklären es Ihnen.</p><h2>2. Was DataBase macht</h2><p>DataBase ist ein Kundenmanagement-Tool, das Ihnen hilft:</p><ul><li>Kundeninformationen zu organisieren</li><li>Besuche und Interaktionen zu verfolgen</li><li>Marketingkampagnen zu verwalten</li><li>Kommunikation zu vereinfachen</li></ul><p>Betrachten Sie uns als Ihren digitalen Assistenten für Kundenbeziehungen.</p><h2>3. Wie unsere Plattform funktioniert</h2><p>Wir stellen die Software bereit &mdash; wir betreiben keine Datenspeicherserver. Ihre Daten werden bei vertrauenswürdigen Cloud-Anbietern gehostet. Obwohl wir seriöse Anbieter nutzen und angemessene Sicherheitsmaßnahmen implementieren, können wir die Infrastruktur Dritter nicht vollständig kontrollieren.</p><h2>4. Ihre Ergebnisse hängen von Ihnen ab</h2><p>DataBase ist ein Werkzeug &mdash; Ihr Erfolg hängt davon ab, wie Sie es nutzen. Wir können nicht garantieren:</p><ul><li>Umsatz- oder Verkaufssteigerungen</li><li>Geschäftswachstum</li><li>Wirksamkeit von Marketingkampagnen</li><li>Bestimmte Ergebnisse</li></ul><p>Jedes Unternehmen ist anders, und die Ergebnisse variieren je nach Ihrem Einsatz, Markt und Ihren Umständen.</p><h2>5. "Wie besehen" bereitgestellt</h2><p>Wir geben unser Bestes, um die App reibungslos laufen zu lassen, können aber nicht garantieren, dass sie immer perfekt ist. Gelegentlich können Störungen oder Unterbrechungen auftreten.</p><h2>6. Sie übernehmen einige Risiken</h2><p>Bei der Nutzung der App akzeptieren Sie bestimmte Risiken, einschließlich:</p><ul><li>Möglicher Datenverlust oder -beschädigung (bitte Backups erstellen!)</li><li>Dienstunterbrechunge       '<p>Welkom bij DataBase! Neem even de tijd om deze voorwaarden door te nemen. Door de app te gebruiken, ga je akkoord met deze richtlijnen.</p><h2>1. Aan de Slag</h2><p>Door DataBase te downloaden en te gebruiken, ga je akkoord met deze Servicevoorwaarden, ons Privacybeleid en de Arbitrageovereenkomst. Als iets onduidelijk is, zijn we er om te helpen&mdash;neem gerust contact met ons op.</p><h2>2. Wat Deze App Doet</h2><p>DataBase is een klantbeheertool die je helpt bij het organiseren van klantinformatie, het bijhouden van bezoeken, het beheren van marketingcampagnes en het contact houden met je klanten. Zie het als je digitale assistent voor klantrelaties.</p><h2>3. Hoe Ons Platform Werkt</h2><p>Database LLC levert de software, maar we beheren geen eigen dataopslagservers. Je gegevens worden veilig opgeslagen bij vertrouwde cloud-aanbieders. We kiezen zorgvuldig gerenommeerde leveranciers en implementeren sterke beveiligingsmaatregelen, maar omdat we hun infrastructuur niet direct beheren, kunnen we geen absolute garanties geven over hun systemen.</p><h2>4. Je Resultaten Kunnen Variëren</h2><p>DataBase is een tool om je te helpen efficiënter te werken&mdash;geen tovermiddel. We kunnen geen specifieke resultaten beloven zoals:</p><ul><li>Hogere omzet of bedrijfsgroei</li><li>Meer klanten of betere retentie</li><li>Succesvolle marketingcampagnes</li><li>Bepaalde bedrijfsresultaten</li></ul><p>Je succes hangt af van hoe je de app gebruikt, je bedrijfspraktijken, marktomstandigheden en vele andere factoren. Wat voor één gebruiker werkt, werkt mogelijk niet hetzelfde voor een ander.</p><h2>5. De App Wordt Geleverd "zoals Deze Is"</h2><p>We werken hard om DataBase betrouwbaar en nuttig te maken, maar we leveren het "zoals het is" en "zoals beschikbaar" zonder garanties over:</p><ul><li>Perfecte werking voor elke situatie</li><li>Ononderbroken of foutloze werking</li><li>Volledige nauwkeurigheid van alle informatie</li><li>Absolute gegevensbeveiliging</li></ul><p>We doen ons best om alles goed te laten werken, maar technologie is niet perfect.</p><h2>6. De Risico\'s Begrijpen</h2><p>Bij het gebruik van DataBase begrijp je dat sommige risico\'s inherent zijn aan elke online dienst:</p><ul><li>Gegevens kunnen mogelijk verloren gaan of beschadigd raken</li><li>Beveiligingsincidenten kunnen ondanks voorzorgsmaatregelen optreden</li><li>Diensten kunnen af en toe onderbroken worden</li><li>Externe leveranciers kunnen problemen ondervinden</li><li>Je bent verantwoordelijk voor je zakelijke beslissingen</li></ul><p>We nemen beveiliging serieus en werken eraan deze risico\'s te minimaliseren, maar we willen dat je weet dat ze bestaan.</p><h2>7. Je Verantwoordelijkheden</h2><p>Bij het gebruik van DataBase ben je verantwoordelijk voor:</p><ul><li>Zorgen dat de gegevens die je invoert nauwkeurig en legaal zijn</li><li>Het naleven van toepasselijke wetten zoals CAN-SPAM, TCPA, AVG en CCPA</li><li>Het verkrijgen van de juiste toestemming voordat je je klanten contacteert</li><li>De inhoud van je e-mails, berichten en marketingmateriaal</li><li>Het onderhouden van vereiste bedrijfsvergunningen</li><li>De resultaten van je gebruik van de app</li></ul><h2>8. Je Account Beveiligen</h2><p>Houd je inloggegevens privé en veilig. Je bent verantwoordelijk voor alles wat onder je account gebeurt.</p><h3>8.1 Face Id en Touch Id (optioneel)</h3><p>Je kunt Face ID of Touch ID gebruiken voor sneller en gemakkelijker inloggen:</p><ul><li>Je biometrische gegevens blijven op je apparaat&mdash;we zien of bewaren ze nooit op onze servers</li><li>Je kunt deze functie op elk moment uitschakelen en terugkeren naar wachtwoordinloggen</li><li>Houd je apparaat veilig, want we kunnen niet beschermen tegen ongeautoriseerde toegang als iemand de biometrische beveiliging van je apparaat compromitteert</li></ul><h2>9. Verantwoord Gebruik van de App</h2><p>Gebruik DataBase alsjeblieft niet om:</p><ul><li>Wetten of regels te overtreden</li><li>Spam of ongewenste berichten te versturen</li><li>Persoonlijke informatie te verzamelen zonder toestemming</li><li>Deel te nemen aan frauduleuze of misleidende activiteiten</li><li>Te proberen de app te beschadigen of te verstoren</li></ul><h2>10. Intellectueel Eigendom</h2><p>De DataBase-app en de inhoud ervan zijn eigendom van Database LLC en worden beschermd door intellectuele eigendomsrechten.</p><h2>11. Wijzigingen in de Dienst</h2><p>We kunnen functies van de app bijwerken, wijzigen of stopzetten terwijl we deze blijven verbeteren.</p><h2>12. Accountbeëindiging</h2><p>We kunnen je account opschorten of beëindigen als je deze Voorwaarden overtreedt. We hopen dat het nooit zover komt!</p><h2>13. Toepasselijk Recht</h2><p>Deze Voorwaarden worden beheerst door de wetten van de Verenigde Staten.</p><h2>14. Updates van Deze Voorwaarden</h2><p>We kunnen deze Voorwaarden van tijd tot tijd bijwerken. We laten je weten over belangrijke wijzigingen, en voortgezet gebruik betekent dat je de updates accepteert.</p><h2>15. Vragen?</h2><p>Heb je vragen over deze Voorwaarden? Neem contact met ons op via: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><p>We zijn er om je te helpen!</p>',

      '<p>Tervetuloa DataBaseen! Lue nämä ehdot läpi ennen kuin aloitat. Käyttämällä sovellusta hyväksyt nämä ehdot.</p><h2>1. Ehtojen hyväksyminen</h2><p>Käyttämällä sovellusta vahvistat, että olet lukenut ja hyväksynyt nämä Käyttöehdot, Tietosuojakäytäntömme ja niihin liittyvät asiakirjat. Jos et ole samaa mieltä, älä käytä sovellusta.</p><h2>2. Mitä DataBase tarjoaa</h2><p>DataBase on asiakashallintatyökalu, joka auttaa sinua järjestämään asiakastietoja, seuraamaan käyntejä, hallinnoimaan markkinointikampanjoita ja helpottamaan viestintää. Se on tuottavuustyökalu, joka auttaa sinua yrityksesi pyörittämisessä.</p><h2>3. Tuloksesi riippuvat sinusta</h2><p>DataBase antaa sinulle loistavia työkaluja, mutta tuloksesi riippuvat siitä, miten käytät niitä. Emme voi luvata tiettyä liikevaihtoa, kasvua tai menestystä, koska nämä riippuvat päätöksistäsi, markkinaolosuhteista ja monista muista tekijöistä. Lupaamme antaa sinulle parhaat työkalut tavoitteidesi saavuttamiseen.</p><h2>4. Sinun vastuusi</h2><p>Olet vastuussa:</p><ul><li>Sovellukseen syöttämiesi tietojen oikeellisuudesta</li><li>Alueesi lakien noudattamisesta</li><li>Suostumuksen hankkimisesta asiakkailta ennen yhteydenottoa</li><li>Lähettämiesi viestien sisällöstä</li></ul><h2>5. Tilin turvallisuus</h2><p>Pidä tilisi tiedot turvassa. Olet vastuussa kaikista tilisi toiminnoista.</p><h2>6. Pelisäännöt</h2><p>Älä käytä DataBasea:</p><ul><li>Lakien tai sääntöjen rikkomiseen</li><li>Roskapostin tai ei-toivottujen viestien lähettämiseen</li><li>Henkilötietojen keräämiseen ilman suostumusta</li><li>Petolliseen tai harhaanjohtavaan toimintaan</li><li>Sovelluksen vahingoittamiseen tai häiritsemiseen</li></ul><h2>7. Immateriaalioikeudet</h2><p>DataBase-sovellus ja sen sisältö ovat Database LLC:n omaisuutta ja suojattu immateriaalioikeuksilla.</p><h2>8. Palvelun muutokset</h2><p>Saatamme päivittää, muuttaa tai lopettaa sovelluksen toimintoja kehittäessämme sitä edelleen.</p><h2>9. Tilin irtisanominen</h2><p>Saatamme keskeyt       '<p>Velkomin í DataBase! Vinsamlegast farðu yfir þessa skilmála áður en þú byrjar. Með því að nota forritið samþykkir þú þessa skilmála.</p><h2>Samþykki</h2><p>Með því að nota forritið staðfestir þú að þú hafir lesið og samþykkt þessa Notkunarskilmála, Persónuverndarstefnu okkar og tengd skjöl. Ef þú ert ekki sammála, vinsamlegast notaðu ekki forritið.</p><h2>Um Þjónustuna</h2><p>DataBase er viðskiptavinastjórnunartæki sem hjálpar þér að skipuleggja viðskiptavinaupplýsingar, fylgjast með heimsóknum og stjórna markaðsherferðum. Við hönnuðum það til að skapa virði fyrir fyrirtækið þitt, en árangur veltur á hvernig þú notar það.</p><h2>Um Árangur</h2><p>Við skulum vera heiðarleg: við getum ekki ábyrgst ákveðinn árangur. DataBase er verkfæri &mdash; árangur veltur á hvernig þú notar það, viðskiptaaðferðum þínum og markaðsaðstæðum. Árangurssögur eru hvetjandi, en niðurstöður eru mismunandi eftir einstaklingum.</p><h2>Þínar Skyldur</h2><ul><li>Tryggja nákvæmni gagna sem þú setur inn</li><li>Fara eftir markaðs- og persónuverndarlögum eins og CAN-SPAM, GDPR o.fl.</li><li>Fá viðeigandi leyfi áður en samskipti eru send</li><li>Halda reikningsöryggi þínu</li><li>Viðhalda viðskiptaleyfum þínum</li></ul><h2>Leyfileg Notkun</h2><p>Við búumst við því að þú notir forritið í samræmi við lög. Vinsamlegast forðastu:</p><ul><li>Brot á lögum eða reglum</li><li>Að senda óumbeðin skilaboð (ruslpóst)</li><li>Að safna gögnum án heimildar</li><li>Villandi athæfi</li></ul><h2>Hugverkaréttur</h2><p>Forritið og innihald þess tilheyrir Database LLC og er verndað af viðeigandi lögum.</p><h2>Breytingar</h2><p>Við getum gert breytingar til að bæta eða uppfæra forritið. Við látum þig vita um mikilvægar breytingar.</p><h2>Gildandi Lög</h2><p>Þessir skilmálar lúta bandarískum lögum.</p><h2>Hafa Samband</h2><p>Spurningar? Hafðu samband við okkur á: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>Добро пожаловать в DataBase! Уделите немного времени ознакомлению с этими условиями. Используя приложение, вы соглашаетесь с данными правилами.</p><h2>1. Начало Работы</h2><p>Загружая и используя DataBase, вы соглашаетесь с настоящими Условиями использования, нашей Политикой конфиденциальности и Арбитражным соглашением. Если что-то непонятно, мы готовы помочь &mdash; свяжитесь с нами в любое время.</p><h2>2. Что Делает Это Приложение</h2><p>DataBase &mdash; это инструмент управления клиентами, который помогает организовывать информацию о клиентах, отслеживать посещения, управлять маркетинговыми кампаниями и поддерживать связь с вашими клиентами. Думайте о нём как о своём цифровом помощнике по работе с клиентами.</p><h2>3. Как Работает Наша Платформа</h2><p>Database LLC предоставляет программное обеспечение, но мы не управляем собственными серверами хранения данных. Ваши данные надёжно хранятся у проверенных облачных провайдеров. Мы тщательно выбираем надёжных поставщиков и применяем строгие меры безопасности, но поскольку мы не контролируем их инфраструктуру напрямую, мы не можем давать абсолютных гарантий относительно их систем.</p><h2>4. Ваши Результаты Могут Различаться</h2><p>DataBase &mdash; это инструмент, который поможет вам работать эффективнее, но не волшебная палочка. Мы не можем обещать конкретных результатов, таких как:</p><ul><li>Увеличение доходов или рост бизнеса</li><li>Больше клиентов или лучшее удержание</li><li>Успешные маркетинговые кампании</li><li>Определённые бизнес-результаты</li></ul><p>Ваш успех зависит от того, как вы используете приложение, вашей бизнес-практики, рыночных условий и многих других факторов. То, что работает для одного пользователя, может не сработать так же для другого.</p><h2>5. Приложение Предоставляется «Как Есть»</h2><p>Мы усердно работаем, чтобы DataBase был надёжным и полезным, но мы предоставляем его «как есть» и «по мере доступности» без гарантий относительно:</p><ul><li>Идеальной работы для каждой ситуаци луйста, не используйте DataBase для:</p><ul><li>Нарушения законов или правил</li><li>Отправки спама или нежелательных сообщений</li><li>Сбора личной информации без согласия</li><li>Участия в мошеннических или обманных действиях</li><li>Попыток повредить или нарушить работу приложения</li></ul><h2>10. Интеллектуальная Собственность</h2><p>Приложение DataBase и его содержимое принадлежат Database LLC и защищены законами об интеллектуальной собственности.</p><h2>11. Изменения В Сервисе</h2><p>Мы можем обновлять, изменять или прекращать функции приложения по мере его улучшения.</p><h2>12. Закрытие Аккаунта</h2><p>Мы можем приостановить или закрыть ваш аккаунт, если вы нарушите эти Условия. Надеемся, до этого никогда не дойдёт!</p><h2>13. Применимое Право</h2><p>Настоящие Условия регулируются законами Соединённых Штатов.</p><h2>14. Обновление Этих Условий</h2><p>Мы можем время от времени обновлять эти Условия. Мы сообщим вам о важных изменениях, а продолжение использования означает принятие обновлений.</p><h2>15. Вопросы?</h2><p>Есть вопросы об этих Условиях? Свяжитесь с нами: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><p>Мы здесь, чтобы помочь!</p>',
      '<p>DataBase\'e hoş geldiniz! Başlamadan önce bu koşulları gözden geçirmenizi rica ediyoruz. Uygulamayı kullanarak bu koşulları kabul etmiş olursunuz.</p><h2>Kabul</h2><p>Uygulamayı kullanarak, bu Kullanım Koşullarını, Gizlilik Politikamızı ve ilgili belgeleri okuduğunuzu ve kabul ettiğinizi onaylıyorsunuz. Kabul etmiyorsanız, uygulamayı kullanmayınız.</p><h2>Hi̇zmet Hakkinda</h2><p>DataBase, müşteri bilgilerinizi düzenlemenize, ziyaretleri takip etmenize ve pazarlama kampanyalarını yönetmenize yardımcı olan bir iş aracıdır. Size değer katmak için tasarlandık, ancak sonuçlar sizin kullanımınıza bağlıdır.</p><h2>Sonuçlar Hakkinda</h2><p>Dürüst olmak gerekirse: belirli sonuçları garanti edemiyoruz. DataBase bir araçtır &mdash; başarı, onu nasıl kullandığınıza, iş uygulamalarınıza ve piyasa koşullarına bağlıdır. Başarı hikayeleri ilham vericidir, ancak sonuçlar kişiden kişiye değişir.</p><h2>Si̇zi̇n Sorumluluklariniz</h2><ul><li>Girdiğiniz verilerin doğruluğunu sağlamak</li><li>CAN-SPAM, GDPR, KVKK gibi pazarlama ve gizlilik yasalarına uymak</li><li>İletişim göndermeden önce uygun izinleri almak</li><li>Hesap güvenliğinizi korumak</li><li>İşletme lisanslarınızı güncel tutmak</li></ul><h2>Kabul Edi̇lebi̇li̇r Kullanim</h2><p>Uygulamayı yasalara uygun şekilde kullanmanızı bekliyoruz. Şunlardan kaçının:</p><ul><li>Yasa veya düzenlemeleri ihlal etmek</li><li>İstenmeyen mesajlar (spam) göndermek</li><li>İzinsiz veri toplamak</li><li>Aldatıcı uygulamalarda bulunmak</li></ul><h2>Fi̇kri̇ Mülki̇yet</h2><p>Uygulama ve içerikleri Database LLC\'a aittir ve ilgili yasalarla korunmaktadır.</p><h2>Deği̇şi̇kli̇kler</h2><p>Uygulamayı geliştirmek veya güncellemek için değişiklikler yapabiliriz. Önemli değişikliklerde sizi bilgilendireceğiz.</p><h2>Uygulanacak Hukuk</h2><p>Bu koşullar ABD yasalarına tabidir.</p><h2>İleti̇şi̇m</h2><p>Sorularınız için: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>欢迎使用 DataBase！在开始之前，我们想让您了解我们的服务是如何运作的，以及您可以期待什么。</p><h2>1. 同意条款</h2><p>使用 DataBase，即表示您同意本条款、我们的隐私政策和法律声明。如有任何疑问，请随时联系我们&mdash;&mdash;我们很乐意为您解答。</p><h2>2. DataBase 的功能</h2><p>DataBase 是一款客户管理工具，帮助您：</p><ul><li>整理客户信息</li><li>跟踪访问和互动</li><li>管理营销活动</li><li>便捷沟通</li></ul><p>把我们想象成您客户关系的数字助手。</p><h2>3. 您的成果取决于您</h2><p>DataBase 是一个工具&mdash;&mdash;您的成功取决于您如何使用它。我们无法保证：</p><ul><li>收入或销售额增加</li><li>业务增长</li><li>营销活动效果</li><li>特定成果</li></ul><p>每个企业都不同，成果因您的努力、市场和具体情况而异。</p><h2>4. "按原样"提供</h2><p>我们尽最大努力保持应用正常运行，但无法保证它始终完美。偶尔可能会出现故障或中断。</p><h2>5. 您的责任</h2><p>作为用户，您有责任：</p><ul><li>确保输入的数据准确合法</li></ul><h2>• 遵守适用法律（can-spam、tcpa、gdpr 等）</h2><ul><li>在发送通信之前获得客户同意</li><li>消息和营销材料的内容</li><li>维护必要的营业执照</li></ul><h2>6. 账户安全</h2><p>请妥善保管您的登录信息，不要分享。您的账户发生的一切由您负责。</p><h2>7. 正确使用</h2><p>请不要使用应用来：</p><ul><li>违反法律或法规</li><li>发送垃圾邮件或未经请求的通信</li><li>未经同意收集个人信息</li><li>从事欺诈或欺骗行为</li><li>损害应用或其他用户</li></ul><h2>8. 知识产权</h2><p>应用及其内容属于 Database LLC，受知识产权法保护。</p><h2>9. 服务变更</h2><p>我们可能会随时更新、修改或停止功能以改进服务。</p><h2>10. 账户终止</h2><p>如果违反本条款，我们可能会终止或暂停您的访问。</p><h2>11. 适用法律</h2><p>本条款受美国佛罗里达州法律管辖。</p><h2>12. 条款更新</h2><p>我们可能会不时更新本条款。如有重大变更，您需要同意新条款才能继续使用应用。</p><h2>13. 联系我们</h2><p>有问题？请联系我们：<a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>',
      '<p>DataBase에 오신 것을 환영합니다! 시작하기 전에 이 약관을 읽어주세요. 앱을 사용함으로써 이 약관에 동의하게 됩니다.</p><h2>1. 약관 동의</h2><p>앱을 사용함으로써 본 서비스 이용약관, 개인정보처리방침 및 관련 문서를 읽고 동의하셨음을 확인합니다. 동의하지 않으시면 앱을 사용하지 마세요.</p><h2>2. DataBase가 제공하는 것</h2><p>DataBase는 고객 정보를 정리하고, 방문을 추적하고, 마케팅 캠페인을 관리하고, 커뮤니케이션을 쉽게 할 수 있도록 도와주는 고객 관리 도구입니다. 비즈니스 운영에 도움이 되는 생산성 도구입니다.</p><h2>3. 결과는 사용자에게 달려 있습니다</h2><p>DataBase는 훌륭한 도구를 제공하지만, 결과는 사용 방법에 따라 달라집니다. 특정 수익, 성장 또는 성공을 보장할 수 없습니다. 이는 귀하의 결정, 시장 상황 및 많은 다른 요인에 따라 달라지기 때문입니다. 우리가 약속하는 것은 목표 달성을 위한 최고의 도구를 제공하는 것입니다.</p><h2>4. 귀하의 책임</h2><p>다음 사항은 귀하의 책임입니다:</p><ul><li>앱에 입력하는 데이터의 정확성</li><li>해당 지역 법률 준수</li><li>연락하기 전에 고객 동의 획득</li><li>발송하는 메시지 내용</li></ul><h2>5. 계정 보안</h2><p>계정 정보를 안전하게 보관하세요. 계정에서 발생하는 모든 활동에 대해 책임이 있습니다.</p><h2>6. 이용 규칙</h2><p>DataBase를 다음 용도로 사용하지 마세요:</p><ul><li>법률 또는 규정 위반</li><li>스팸이나 원치 않는 메시지 발송</li><li>동의 없이 개인정보 수집</li><li>사기나 기만적인 활동 참여</li><li>앱 손상 또는 방해</li></ul><h2>7. 지적 재산권</h2><p>DataBase 앱과 그 콘텐츠는 Database LLC의 소유이며 지적 재산권으로 보호됩니다.</p><h2>8. 서비스 변경</h2><p>앱을 계속 개선하면서 기능을 업데이트, 변경 또는 중단할 수 있습니다.</p><h2>9. 계정 해지</h2><p>본 약관을 위반하면 계정이 정지되거나 해지될 수 있습니다. 그런 일이 없기를 바랍니다!</p><h2>10. 준거법</h2><p>본 약관은 미국 법률의 적용을 받습니다.</p><h2>11. 약관 업데이트</h2><p>수시로 본 약관을 업데이트할 수 있습니다. 중요한 변경 사항은 알려드리며, 계속 사용하면 업데이트에 동의하는 것입니다.</p><h2>12. 질문이 있으신가요?</h2><p>본 약관에 대해 질문이 있으시면 연락주세요: <a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p><p>언제든지 도와드리겠습니다!</p>',
      '<p>DataBaseへようこそ！ご利用を開始される前に、サービスの仕組みとご期待いただける内容についてご説明させてください。</p><h2>1. 利用規約への同意</h2><p>DataBaseをご利用いただくことで、本規約、プライバシーポリシー、および法的免責事項に同意いただいたものとなります。ご不明な点がございましたら、お気軽にお問い合わせください。</p><h2>2. DataBaseでできること</h2><p>DataBaseは、以下のことをサポートする顧客管理ツールです：</p><ul><li>顧客情報の整理</li><li>訪問や取引の追跡</li><li>マーケティングキャンペーンの管理</li><li>コミュニケーションの円滑化</li></ul><p>ビジネスの生産性向上のためのデジタルアシスタントとお考えください。</p><h2>3. 成果はお客様次第</h2><p>DataBaseはツールです。成功はお客様の使い方次第です。以下を保証することはできません：</p><ul><li>売上や収益の増加</li><li>事業の成長</li><li>マーケティングキャンペーンの効果</li><li>特定の成果</li></ul><p>すべてのビジネスは異なり、結果はお客様の努力、市場、状況によって異なります。</p><h2>4. 「現状のまま」でのご提供</h2><p>アプリが正常に動作するよう最善を尽くしていますが、常に完璧であることを保証することはできません。一時的な不具合や中断が発生する場合があります。</p><h2>5. お客様の責任</h2><p>ユーザーとして、お客様には以下の責任があります：</p><ul><li>入力するデータの正確性と合法性の確保</li></ul><h2>• 適用法令（can-spam、tcpa、gdprなど）の遵守</h2><ul><li>通信を送信する前に顧客から同意を得ること</li><li>メッセージやマーケティング資料の内容</li><li>必要な事業許可の維持</li></ul><h2>6. アカウントのセキュリティ</h2><p>ログイン情報は安全に管理し、共有しないでください。アカウント上で発生するすべてのことはお客様の責任となります。</p><h2>7. 適切な使用</h2><p>以下のためにアプリを使用しないでください：</p><ul><li>法律や規制の違反</li><li>スパムや迷惑通信の送信</li><li>同意なく個人情報を収集すること</li><li>詐欺的または欺瞞的な行為</li><li>アプリや他のユーザーに害を与えること</li></ul><h2>8. 知的財産</h2><p>アプリとそのコンテンツはDatabase LLCに帰属し、知的財産法により保護されています。</p><h2>9. サービスの変更</h2><p>サービス改善のため、機能を随時更新、変更、または終了する場合があります。</p><h2>10. アカウントの終了</h2><p>本規約に違反した場合、アクセスを終了または停止する場合があります。</p><h2>11. 準拠法</h2><p>本規約はアメリカ合衆国フロリダ州法に準拠します。</p><h2>12. 規約の更新</h2><p>本規約は随時更新される場合があります。重要な変更がある場合は、アプリのご利用を継続するために新しい規約に同意いただく必要があります。</p><h2>13. お問い合わせ</h2><p>ご質問がございますか？お気軽にお問い合わせください：<a href="mailto:info@mydatabaseapp.com">info@mydatabaseapp.com</a></p>'

  function switchLang(lang) {
    try { localStorage.setItem('db_lang', lang); } catch(e) {}
    var tr = TR[lang] || TR['en'];
    var el;
    el = document.getElementById('terms-label'); if (el && tr.terms_label) el.textContent = tr.terms_label;
    el = document.getElementById('terms-title'); if (el && tr.terms_title) el.textContent = tr.terms_title;
    el = document.getElementById('footer-copy'); if (el && tr.footer_copy) el.textContent = tr.footer_copy;
    el = document.getElementById('link-privacy'); if (el && tr.footer_privacy) { el.textContent = tr.footer_privacy; el.href = 'privacy.html?lang=' + lang; }
    el = document.getElementById('link-terms'); if (el && tr.footer_terms) { el.textContent = tr.footer_terms; el.href = 'terms.html?lang=' + lang; }
    el = document.getElementById('back-link'); if (el) el.href = 'index.html?lang=' + lang;
    el = document.getElementById('lang-pill-text'); if (el) el.textContent = LANG_NAMES[lang] || lang;
    el = document.getElementById('page-date'); if (el) el.textContent = LAST_UPDATED[lang] || LAST_UPDATED['en'];
    var sel = document.querySelector('.lang-select-overlay'); if (sel) sel.value = lang;
    document.documentElement.lang = lang;
    var bodyEl = document.getElementById('terms-body');
    if (bodyEl) bodyEl.innerHTML = TERMS_BODIES[Object.keys(LANG_NAMES).indexOf(lang)] || TERMS_BODIES[0];
    var url = new URL(window.location.href);
    url.searchParams.set('lang', lang);
    history.pushState({}, '', url.toString());
  }

  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');
    if (!lang) { try { lang = localStorage.getItem('db_lang'); } catch(e) {} }
    if (!lang || !TR[lang]) lang = 'en';
    switchLang(lang);
  })();

</script>
